<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Found ZIP Codes Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .legend {
      background: white;
      padding: 10px 15px;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      font-size: 14px;
      line-height: 18px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 5px 0;
    }
    .legend-color {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      border: 1px solid #555;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<script>
  // 1. Create map
  const map = L.map("map").setView([39.5, -98.35], 4);

  // 2. Basemap
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors"
  }).addTo(map);

  // 3. Load color mapping and TopoJSON file
  let zipColors = {};

  Promise.all([
    fetch("./zip_colors.json").then(r => r.json()),
    fetch("./zip_found_tiny.topojson").then(r => r.json())
  ])
    .then(([colorData, topoData]) => {
      zipColors = colorData;

      // Auto-detect TopoJSON object name
      const objectName = Object.keys(topoData.objects)[0];

      const geojson = topojson.feature(
        topoData,
        topoData.objects[objectName]
      );

      // 4. Draw ZIP polygons with color based on status
      const layer = L.geoJSON(geojson, {
        style: (feature) => {
          const zip = feature.properties?.ZIP || "Unknown";
          const colorValue = zipColors[zip];

          // TESTING: Only show Mar (purple) zip codes
          if (colorValue !== "purple") {
            return {
              fillOpacity: 0,
              color: "#555",
              weight: 0,
              interactive: false
            };
          }

          let color = "#9b59b6"; // Mar (purple)

          return {
            fillColor: color,
            fillOpacity: 0.6,
            color: "#555",
            weight: 0.4
          };
        },
        onEachFeature: (feature, layer) => {
          const zip = feature.properties?.ZIP || "Unknown";
          const colorValue = zipColors[zip];
          let status = "Original";
          if (colorValue === "blue") status = "New";
          else if (colorValue === "purple") status = "Mar";
          layer.bindPopup(`<b>ZIP:</b> ${zip}<br><b>Status:</b> ${status}`);
        }
      }).addTo(map);

      // 5. Zoom to data
      map.fitBounds(layer.getBounds());

      // 6. Add legend
      const legend = L.control({ position: "bottomright" });
      legend.onAdd = function (map) {
        const div = L.DomUtil.create("div", "legend");
        div.innerHTML = `
          <div style="font-weight: bold; margin-bottom: 8px;">ZIP Code Status (TESTING: Mar only)</div>
          <div class="legend-item">
            <div class="legend-color" style="background-color: #9b59b6;"></div>
            <span>Mar (274)</span>
          </div>
        `;
        return div;
      };
      legend.addTo(map);
    })
    .catch(err => {
      console.error(err);
      alert("Failed to load files — check filename & server.");
    });
</script>

</body>
</html>
